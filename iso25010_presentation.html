<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ISO 25010 — Slide Presentation</title>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════ DARK MODE TOKENS (default) ═══════════ */
:root {
  --bg0:#04091a; --bg1:#070e26; --bg2:#0b1530; --bg3:#101d3a; --bg4:#172245;
  --line:rgba(96,165,250,.13); --line2:rgba(96,165,250,.26);
  --text:#e2e8f0; --td:#94a3b8; --tm:#475569;
  --tb-bg:rgba(4,9,26,.96);
  --code-bg:#020810;
  --dot-def:#172245;
  --blue:#3b82f6; --blue-l:#60a5fa; --cyan:#06b6d4; --teal:#14b8a6;
  --green:#22c55e; --amber:#f59e0b; --orange:#f97316;
  --rose:#f43f5e; --violet:#a855f7;
  --fh:'Oxanium',sans-serif;
  --fb:'Noto Sans Thai',sans-serif;
  --fm:'JetBrains Mono',monospace;
  --accent:#3b82f6;
}

/* ═══════════ LIGHT MODE TOKENS ═══════════ */
[data-theme="light"] {
  --bg0:#f8fafc; --bg1:#ffffff; --bg2:#f1f5f9; --bg3:#e8eef8; --bg4:#dde6f5;
  --line:rgba(59,130,246,.14); --line2:rgba(59,130,246,.28);
  --text:#0f172a; --td:#334155; --tm:#64748b;
  --tb-bg:rgba(248,250,252,.97);
  --code-bg:#eef2ff;
  --dot-def:#cbd5e1;
}
[data-theme="light"] body { background:var(--bg0); }
[data-theme="light"] .slide { background:var(--bg1); }
[data-theme="light"] .slide::before {
  background-image:
    linear-gradient(rgba(59,130,246,.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,130,246,.06) 1px,transparent 1px);
}
[data-theme="light"] .slide-section {
  background:var(--bg1);
}
[data-theme="light"] .slide-cover {
  background:
    radial-gradient(ellipse 70% 60% at 15% 50%,rgba(59,130,246,.09) 0%,transparent 65%),
    radial-gradient(ellipse 60% 50% at 85% 30%,rgba(6,182,212,.06) 0%,transparent 60%),
    var(--bg1);
}
[data-theme="light"] .panel {
  background:var(--bg2) !important;
  border-color:var(--line) !important;
}
[data-theme="light"] .code-win {
  background:var(--code-bg) !important;
  border-color:var(--line) !important;
}
[data-theme="light"] .code-win .cmt { color:var(--tm) !important; }
[data-theme="light"] .tbl th { background:var(--bg3) !important; }
[data-theme="light"] .tbl td { color:var(--td) !important; }
[data-theme="light"] .veri-row { background:var(--bg2) !important; }
[data-theme="light"] #topbar { background:var(--tb-bg) !important; box-shadow:0 1px 6px rgba(0,0,0,.07); }
[data-theme="light"] #botnav { background:var(--tb-bg) !important; box-shadow:0 -1px 4px rgba(0,0,0,.05); }
[data-theme="light"] .nav-btn { background:var(--bg3) !important; border-color:var(--line2) !important; color:var(--td) !important; }
[data-theme="light"] .nav-btn:hover { background:var(--bg4) !important; color:var(--text) !important; }
[data-theme="light"] .nav-btn.nxt { background:rgba(37,99,235,.1) !important; border-color:rgba(37,99,235,.3) !important; color:#1d4ed8 !important; }
[data-theme="light"] .step-pill:hover { background:rgba(59,130,246,.07) !important; }
[data-theme="light"] .step-pill.on { background:rgba(59,130,246,.1) !important; border-color:rgba(59,130,246,.3) !important; }
[data-theme="light"] #theme-btn { background:var(--bg3) !important; border-color:var(--line2) !important; color:var(--td) !important; }
[data-theme="light"] #theme-btn:hover { background:var(--bg4) !important; color:var(--text) !important; }
[data-theme="light"] .dot { background:var(--dot-def) !important; }
[data-theme="light"] .dot.lg { background:rgba(217,119,6,.3) !important; }
[data-theme="light"] .qa-ov-card { background:var(--bg2) !important; border-color:var(--line) !important; }
[data-theme="light"] .qa-ov-card:hover { background:var(--bg3) !important; }
[data-theme="light"] .v41-big-card { background:var(--bg2) !important; }
[data-theme="light"] .v41-big-diag { background:var(--bg3) !important; }
[data-theme="light"] ::-webkit-scrollbar-track { background:var(--bg1); }
[data-theme="light"] ::-webkit-scrollbar-thumb { background:var(--bg4); }

/* ═══════════ RESET & BASE ═══════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { width:100%; height:100%; overflow:hidden; background:var(--bg0); color:var(--text); font-family:var(--fb); }

/* ═══════════ SHELL ═══════════ */
#app { display:grid; grid-template-rows:42px 2px 1fr 50px; height:100vh; }

/* ─ TOPBAR ─ */
#topbar {
  display:flex; align-items:center; padding:0 1.3rem; gap:.8rem; z-index:100;
  background:var(--tb-bg); border-bottom:1px solid var(--line); backdrop-filter:blur(10px);
}
.tb-brand { font-family:var(--fh); font-weight:800; font-size:.78rem; letter-spacing:.07em; white-space:nowrap; }
.tb-brand #tb-accent { transition:color .35s; }
.tb-div { width:1px; height:16px; background:var(--line2); flex-shrink:0; }
.tb-sec { font-family:var(--fm); font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:var(--tm); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tb-cnt { font-family:var(--fm); font-size:.62rem; color:var(--tm); white-space:nowrap; }
.tb-cnt b { color:var(--blue-l); }
.tb-keys { font-family:var(--fm); font-size:.52rem; color:var(--tm); white-space:nowrap; }
.tb-keys kbd { background:var(--bg3); border:1px solid var(--line2); border-radius:3px; padding:0 4px; font-size:.56rem; }
#theme-btn {
  display:flex; align-items:center; gap:.3rem; padding:.22rem .7rem;
  background:var(--bg3); border:1px solid var(--line2); border-radius:5px;
  font-family:var(--fh); font-size:.58rem; font-weight:700; letter-spacing:.05em;
  color:var(--td); cursor:pointer; transition:all .14s; white-space:nowrap; flex-shrink:0;
}
#theme-btn:hover { background:var(--bg4); color:var(--text); }

/* ─ PROGRESS ─ */
#prog { background:var(--bg2); }
#prog-bar { height:100%; background:linear-gradient(90deg,var(--accent),var(--cyan)); transition:width .35s cubic-bezier(.4,0,.2,1); width:0%; }

/* ─ STAGE ─ */
#stage { position:relative; overflow:hidden; }

/* ─ SLIDE BASE ─ */
.slide {
  position:absolute; inset:0;
  opacity:0; pointer-events:none;
  transition:opacity .28s ease, transform .28s cubic-bezier(.4,0,.2,1);
  transform:translateX(50px);
  padding:1.2rem 1.6rem .85rem;
  display:flex; flex-direction:column;
  overflow:hidden;
  background:var(--bg1);
}
.slide::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:
    linear-gradient(var(--line) 1px,transparent 1px),
    linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:52px 52px;
}
.slide.active { opacity:1; pointer-events:all; transform:none; }
.slide.exit   { opacity:0; transform:translateX(-50px); }

/* ─ BOTTOM NAV ─ */
#botnav {
  display:grid; grid-template-columns:auto 1fr auto; align-items:center; padding:0 1.2rem; gap:.65rem;
  background:var(--tb-bg); border-top:1px solid var(--line); backdrop-filter:blur(10px); z-index:100;
}
.nav-btn {
  display:flex; align-items:center; gap:.35rem; padding:.27rem .85rem;
  border-radius:6px; background:var(--bg3); border:1px solid var(--line2);
  font-family:var(--fh); font-size:.6rem; font-weight:700; letter-spacing:.05em;
  color:var(--td); cursor:pointer; transition:all .12s;
}
.nav-btn:hover { background:var(--bg4); color:var(--text); }
.nav-btn:disabled { opacity:.3; cursor:default; }
.nav-btn.nxt { background:rgba(59,130,246,.12); border-color:rgba(59,130,246,.3); color:var(--blue-l); }
.nav-btn.nxt:hover { background:rgba(59,130,246,.22); }
#dots { display:flex; align-items:center; gap:.25rem; justify-content:center; flex-wrap:wrap; }
.dot { border-radius:50%; cursor:pointer; transition:all .18s; background:var(--dot-def); border:1px solid transparent; flex-shrink:0; }
.dot.sm { width:5px; height:5px; }
.dot.lg { width:7px; height:7px; background:rgba(245,158,11,.3); }
.dot.active { transform:scale(1.45); border-color:var(--accent); }
.dot.sm.active { background:var(--blue-l); }
.dot.lg.active { background:var(--amber); }

/* ═══════════ SLIDE TYPES ═══════════ */

/* Cover */
.slide-cover {
  align-items:center; justify-content:center; text-align:center;
  background:
    radial-gradient(ellipse 70% 60% at 15% 50%,rgba(59,130,246,.12) 0%,transparent 65%),
    radial-gradient(ellipse 60% 50% at 85% 30%,rgba(6,182,212,.07) 0%,transparent 60%),
    var(--bg1);
}
.cov-badge { font-family:var(--fm); font-size:.6rem; letter-spacing:.14em; text-transform:uppercase; color:var(--blue-l); background:rgba(59,130,246,.1); border:1px solid rgba(59,130,246,.28); padding:3px 14px; border-radius:999px; display:inline-block; margin-bottom:1.2rem; }
.cov-title { font-family:var(--fh); font-weight:800; font-size:clamp(2rem,4.5vw,3.2rem); line-height:1.12; margin-bottom:.5rem; }
.cov-title em { font-style:normal; color:var(--amber); }
.cov-sub { font-size:clamp(.78rem,1.2vw,.92rem); color:var(--td); line-height:1.75; max-width:560px; margin:0 auto 1.8rem; }
.cov-chips { display:flex; flex-wrap:wrap; gap:.42rem; justify-content:center; }
.cov-chip { font-family:var(--fm); font-size:.58rem; padding:3px 11px; border-radius:6px; border:1px solid; display:flex; align-items:center; gap:.3rem; }

/* Section divider */
.slide-section {
  border-left:4px solid var(--accent);
  justify-content:center;
  padding:1.8rem 2.3rem;
  background:var(--bg1);
}
.sec-num { font-family:var(--fm); font-size:.58rem; letter-spacing:.13em; text-transform:uppercase; color:var(--tm); margin-bottom:.45rem; }
.sec-icon { font-size:2.6rem; line-height:1; margin-bottom:.65rem; }
.sec-title { font-family:var(--fh); font-size:clamp(1.8rem,3.8vw,2.8rem); font-weight:800; line-height:1.15; color:var(--accent); margin-bottom:.3rem; }
.sec-th { font-size:clamp(.88rem,1.4vw,1.05rem); color:var(--td); margin-bottom:.7rem; line-height:1.5; }
.sec-desc { font-size:.75rem; color:var(--td); max-width:700px; line-height:1.75; padding-left:.9rem; border-left:2px solid var(--line2); }
.sec-subs { display:flex; flex-wrap:wrap; gap:.38rem; margin-top:1rem; }
.sec-sub { font-family:var(--fm); font-size:.57rem; padding:2px 9px; border-radius:5px; border:1px solid; background:rgba(255,255,255,.03); }

/* Content slide heading */
.s-head {
  display:flex; align-items:center; gap:.5rem; flex-shrink:0; margin-bottom:.8rem;
  font-family:var(--fh); font-size:.66rem; font-weight:700; text-transform:uppercase;
  letter-spacing:.07em; color:var(--accent);
}
.s-head::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(128,128,128,.25),transparent); }

/* Layout helpers */
.c2  { display:grid; grid-template-columns:1fr 1fr; gap:.9rem; flex:1; min-height:0; }
.c3  { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.75rem; flex:1; min-height:0; }
.c21 { display:grid; grid-template-columns:2fr 1.1fr; gap:.9rem; flex:1; min-height:0; }
.col { display:flex; flex-direction:column; gap:.5rem; min-height:0; }

/* Panel card */
.panel { background:var(--bg2); border:1px solid var(--line); border-radius:8px; padding:.7rem .85rem; }
.panel.scr { overflow-y:auto; }
.panel.al { border-left:3px solid var(--accent); }
.ph { font-family:var(--fh); font-size:.6rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--tm); margin-bottom:.45rem; }

/* QA Overview 3×3 */
.qa-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:.5rem; flex:1; min-height:0; }
.qa-ov-card {
  background:var(--bg2); border:1px solid var(--line); border-radius:9px;
  padding:.6rem .75rem; cursor:pointer; transition:all .18s; display:flex; flex-direction:column;
}
.qa-ov-card:hover { border-color:var(--line2); transform:translateY(-2px); background:var(--bg3); }
.qa-ov-top { display:flex; align-items:center; gap:.45rem; margin-bottom:.2rem; }
.qa-ov-ico { font-size:1.15rem; }
.qa-ov-id  { font-family:var(--fm); font-size:.52rem; color:var(--tm); }
.qa-ov-en  { font-family:var(--fh); font-size:.72rem; font-weight:700; }
.qa-ov-th  { font-size:.62rem; color:var(--td); margin-bottom:.2rem; }
.qa-ov-desc{ font-size:.6rem; color:var(--tm); line-height:1.45; flex:1; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.qa-ov-tags{ display:flex; flex-wrap:wrap; gap:.18rem; margin-top:.35rem; }
.qa-ov-tag { font-family:var(--fm); font-size:.5rem; padding:1px 5px; border-radius:3px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); color:var(--tm); }

/* Sub-characteristics */
.sub-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:.4rem; }
.sub-item { background:var(--bg3); border:1px solid var(--line); border-radius:7px; padding:.5rem .6rem; }
.sub-name { font-family:var(--fh); font-size:.62rem; font-weight:700; line-height:1.3; margin-bottom:.15rem; }
.sub-th   { font-family:var(--fm); font-size:.52rem; color:var(--tm); margin-bottom:.18rem; }
.sub-desc { font-size:.62rem; color:var(--td); line-height:1.45; }

/* Process steps */
.proc-layout { display:grid; grid-template-columns:1fr 215px; gap:.85rem; flex:1; min-height:0; }
.proc-detail { display:flex; flex-direction:column; gap:.45rem; min-height:0; overflow:hidden; }
.proc-step-num   { font-family:var(--fm); font-size:.57rem; color:var(--tm); letter-spacing:.1em; }
.proc-step-title { font-family:var(--fh); font-size:.92rem; font-weight:700; color:var(--accent); line-height:1.3; margin-bottom:.22rem; }
.proc-step-desc  { font-size:.72rem; color:var(--td); line-height:1.65; }
.code-win {
  flex:1; min-height:0;
  background:var(--code-bg); border:1px solid rgba(59,130,246,.13); border-left:3px solid var(--accent);
  border-radius:8px; padding:.68rem .88rem; overflow:auto;
  font-family:var(--fm); font-size:.63rem; line-height:1.78; color:var(--td);
  white-space:pre-wrap;
}
.code-win .key { color:var(--blue-l); }
.code-win .val { color:var(--amber); }
.code-win .str { color:var(--teal); }
.code-win .cmt { color:var(--tm); font-style:italic; }
.code-win .ok  { color:var(--green); }
.code-win .err { color:var(--rose); }

/* Step nav */
.step-pills { display:flex; flex-direction:column; gap:.28rem; }
.step-pill {
  display:flex; align-items:flex-start; gap:.48rem; padding:.42rem .52rem; border-radius:7px;
  cursor:pointer; border:1px solid transparent; transition:all .14s;
}
.step-pill:hover { background:rgba(255,255,255,.04); }
.step-pill.on { background:rgba(96,165,250,.09); border-color:rgba(96,165,250,.22); }
.pill-num {
  width:24px; height:24px; border-radius:50%; border:1.5px solid;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--fm); font-size:.57rem; font-weight:700; flex-shrink:0; transition:all .14s;
}
.step-pill.on .pill-num { background:var(--accent); border-color:var(--accent); color:#fff; }
.pill-t { font-family:var(--fh); font-size:.63rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pill-d { font-size:.57rem; color:var(--tm); line-height:1.35; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.step-pill.on .pill-t { color:var(--accent); }

/* Metrics table */
.tbl { width:100%; border-collapse:collapse; font-size:.61rem; }
.tbl th { background:var(--bg3); border:1px solid var(--line); padding:.28rem .45rem; font-family:var(--fh); font-size:.55rem; text-transform:uppercase; letter-spacing:.07em; color:var(--tm); text-align:left; white-space:nowrap; }
.tbl td { border:1px solid var(--line); padding:.28rem .45rem; vertical-align:top; color:var(--td); }
.tbl tr:nth-child(even) td { background:rgba(128,128,128,.03); }
.tbl td:first-child { font-family:var(--fm); color:var(--accent); }
.badge-ok { font-family:var(--fm); font-size:.57rem; padding:1px 7px; border-radius:4px; background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.25); color:var(--green); white-space:nowrap; display:inline-block; }

/* Verification */
.veri-stack { display:flex; flex-direction:column; gap:.3rem; }
.veri-row { display:flex; align-items:flex-start; gap:.42rem; padding:.36rem .48rem; background:var(--bg2); border:1px solid var(--line); border-radius:6px; }
.v-badge { font-family:var(--fm); font-size:.52rem; padding:1px 6px; border-radius:3px; flex-shrink:0; margin-top:1px; white-space:nowrap; }
.v-auto   { background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.25); color:var(--green); }
.v-tool   { background:rgba(59,130,246,.12); border:1px solid rgba(59,130,246,.25); color:var(--blue-l); }
.v-manual { background:rgba(245,158,11,.12); border:1px solid rgba(245,158,11,.25); color:var(--amber); }
.v-text { font-size:.64rem; color:var(--td); line-height:1.45; }

/* 4+1 view mapping */
.v41-row { display:flex; gap:.32rem; }
.v41-card { flex:1; border:1px solid; border-radius:7px; padding:.38rem .42rem; text-align:center; display:flex; flex-direction:column; align-items:center; gap:.16rem; }
.v41-ico  { font-size:.92rem; }
.v41-nm   { font-family:var(--fh); font-size:.52rem; font-weight:700; line-height:1.25; }
.v41-rel  { font-family:var(--fm); font-size:.46rem; padding:1px 5px; border-radius:3px; display:inline-block; }
.rel-high { background:rgba(245,158,11,.12); border:1px solid rgba(245,158,11,.28); color:var(--amber); }
.rel-med  { background:rgba(59,130,246,.1);  border:1px solid rgba(59,130,246,.22); color:var(--blue-l); }
.rel-low  { background:rgba(100,116,139,.07);border:1px solid rgba(100,116,139,.18);color:var(--tm); }
.v41-dsc  { font-size:.53rem; color:var(--td); line-height:1.35; }

/* 4+1 overview big cards */
.v41-big-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; flex:1; min-height:0; overflow:hidden; }
.v41-big-card { background:var(--bg2); border:1px solid var(--line); border-radius:9px; padding:.65rem .78rem; display:flex; flex-direction:column; gap:.28rem; }
.v41-big-ico  { font-size:1.35rem; }
.v41-big-name { font-family:var(--fh); font-size:.75rem; font-weight:700; }
.v41-big-focus{ font-family:var(--fm); font-size:.56rem; color:var(--tm); }
.v41-big-diag { font-family:var(--fm); font-size:.53rem; color:var(--td); padding:.22rem .38rem; background:var(--bg3); border-radius:4px; border:1px solid var(--line); }
.v41-qa-tags  { display:flex; flex-wrap:wrap; gap:.18rem; margin-top:.12rem; }
.v41-qa-tag   { font-family:var(--fm); font-size:.49rem; padding:1px 5px; border-radius:3px; background:rgba(96,165,250,.07); border:1px solid rgba(96,165,250,.15); color:var(--blue-l); }

/* Scrollbars */
::-webkit-scrollbar { width:3px; height:3px; }
::-webkit-scrollbar-track { background:var(--bg1); }
::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:2px; }
</style>
</head>
<body>
<div id="app">

  <!-- ─ TOPBAR ─ -->
  <div id="topbar">
    <div class="tb-brand">ISO <span id="tb-accent" style="color:var(--blue-l)">25010</span></div>
    <div class="tb-div"></div>
    <div class="tb-sec" id="tb-sec">Product Quality Model</div>
    <div class="tb-div"></div>
    <div class="tb-cnt"><b id="cur-n">1</b>&nbsp;/&nbsp;<span id="tot-n">—</span></div>
    <div style="flex:1"></div>
    <div class="tb-keys"><kbd>←</kbd><kbd>→</kbd> nav · <kbd>Space</kbd> next · <kbd>Home</kbd> cover</div>
    <div class="tb-div"></div>
    <button id="theme-btn" onclick="toggleTheme()">☀ Light</button>
  </div>

  <!-- ─ PROGRESS ─ -->
  <div id="prog"><div id="prog-bar"></div></div>

  <!-- ─ STAGE ─ -->
  <div id="stage"></div>

  <!-- ─ BOTTOM NAV ─ -->
  <div id="botnav">
    <button class="nav-btn prv" id="btn-p" onclick="go(-1)" disabled>← Prev</button>
    <div id="dots"></div>
    <button class="nav-btn nxt" id="btn-n" onclick="go(1)">Next →</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
//  DATA (injected)
// ════════════════════════════════════════════════
const QA_DATA = [
  {
    id: 'functional',

                <div style="font-family:var(--fh);font-size:.58rem;font-weight:700;color:${qa.color}">${qa.en.split(' ').slice(0,2).join(' ')}</div>
              </div>
            </div>
          </div>`).join('')}
        </div>
      </div>
      <div class="col">
        <div class="panel al" style="--accent:#14b8a6;border-left-color:#14b8a6">
          <div style="font-family:var(--fh);font-size:.85rem;font-weight:800;color:var(--teal);margin-bottom:.25rem">Quality in Use Model</div>
          <div style="font-family:var(--fm);font-size:.58rem;color:var(--tm);margin-bottom:.5rem">มุมมองของ User / Business</div>
          <div style="font-size:.7rem;color:var(--td);line-height:1.65">ประสบการณ์ที่ user ได้รับเมื่อใช้งานจริง — Product Quality สูงไม่ได้รับประกัน Quality in Use เสมอไป</div>
        </div>
        ${[{i:'🎯',n:'Effectiveness',th:'บรรลุเป้าหมายได้ครบ',c:'#22c55e'},
           {i:'⚡',n:'Efficiency',th:'ใช้ effort น้อยแค่ไหน',c:'#60a5fa'},
           {i:'😊',n:'Satisfaction',th:'พึงพอใจในการใช้งาน',c:'#f59e0b'},
           {i:'🛡',n:'Freedom from Risk',th:'ไม่ก่อความเสี่ยงต่อ user',c:'#f43f5e'},
           {i:'🌐',n:'Context Coverage',th:'ใช้ได้หลาย context',c:'#a855f7'},
        ].map(q=>`
        <div class="panel" style="display:flex;align-items:center;gap:.6rem;padding:.42rem .58rem;border-left:2px solid ${q.c}">
          <span style="font-size:1rem">${q.i}</span>
          <div>
            <div style="font-family:var(--fh);font-size:.63rem;font-weight:700;color:${q.c}">${q.n}</div>
            <div style="font-size:.6rem;color:var(--td)">${q.th}</div>
          </div>
        </div>`).join('')}
        <div class="panel" style="background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.2);margin-top:auto;padding:.48rem .6rem">
          <div style="font-size:.68rem;color:var(--td);line-height:1.6">
            💡 ต้องวัด<strong style="color:var(--amber)">ทั้งสองมุม</strong> — Product Quality สูงแต่ Usability ต่ำก็ไม่ถือว่า "ดี"
          </div>
        </div>
      </div>
    </div>` });

  // ─ 2. QA OVERVIEW ─
  S.push({ lbl:'9 Quality Attributes — Overview', color:'#60a5fa', type:'content', qaMap: true, html:`
    <div class="s-head" style="color:var(--blue-l)">🗺 9 Quality Attributes (คลิกเพื่อ jump ไปยัง QA นั้น)</div>
    <div class="qa-grid" id="qa-overview-grid">
      ${QA_DATA.map(qa=>`
      <div class="qa-ov-card" style="border-left:3px solid ${qa.color}" onclick="jumpQA('${qa.id}')">
        <div class="qa-ov-top">
          <span class="qa-ov-ico">${qa.icon}</span>
          <div>
            <div class="qa-ov-id">${qa.num}</div>
            <div class="qa-ov-en" style="color:${qa.color}">${qa.en}</div>
          </div>
        </div>
        <div class="qa-ov-th">${qa.th}</div>
        <div class="qa-ov-desc">${qa.desc}</div>
        <div class="qa-ov-tags">
          ${qa.subs.slice(0,3).map(s=>`<span class="qa-ov-tag">${s.name}</span>`).join('')}
        </div>
      </div>`).join('')}
    </div>` });

  // ─ Per-QA: 3 slides each ─
  QA_DATA.forEach((qa, qi) => {
    const label = `${qa.num} · ${qa.en}`;

    // SLIDE A: Section + Sub-characteristics
    S.push({ lbl: label, color: qa.color, type:'section', qaId: qa.id, html:`
      <div class="sec-num">${qa.num} · QA ${String(qi+1).padStart(2,'0')} of ${QA_DATA.length}</div>
      <div class="sec-icon">${qa.icon}</div>
      <div class="sec-title">${qa.en}</div>
      <div class="sec-th">${qa.th}</div>
      <div class="sec-desc">${qa.desc}</div>
      <div class="sec-subs">
        ${qa.subs.map(s=>`
        <div style="background:${qa.bg};border:1px solid ${qa.color}44;border-radius:8px;padding:.38rem .62rem;flex:1;min-width:165px">
          <div style="font-family:var(--fh);font-size:.61rem;font-weight:700;color:${qa.color};margin-bottom:.12rem">${s.name}</div>
          <div style="font-family:var(--fm);font-size:.52rem;color:var(--td);margin-bottom:.08rem">${s.th}</div>
          <div style="font-size:.61rem;color:var(--td);line-height:1.45">${s.desc}</div>
        </div>`).join('')}
      </div>` });

    // SLIDE B: Process Steps (interactive)
    S.push({ lbl: `${label} — กระบวนการ`, color: qa.color, type:'content', qaId: qa.id, html:`
      <div class="s-head">${qa.icon} ${qa.en} — กระบวนการวัดและกำหนด SLO</div>
      <div class="proc-layout">
        <div class="proc-detail">
          <div class="proc-step-num" id="pn-${qa.id}">STEP ${qa.process[0].num} / ${String(qa.process.length).padStart(2,'0')}</div>
          <div class="proc-step-title" style="color:${qa.color}" id="pt-${qa.id}">${qa.process[0].title}</div>
          <div class="proc-step-desc" id="pd-${qa.id}">${qa.process[0].desc}</div>
          <div class="code-win" style="border-left-color:${qa.color}" id="pc-${qa.id}">${qa.process[0].example}</div>
        </div>
        <div class="col" style="gap:.32rem">
          <div style="font-family:var(--fm);font-size:.55rem;color:var(--tm);text-transform:uppercase;letter-spacing:.1em;padding:.08rem .2rem">Steps</div>
          <div class="step-pills" id="sp-${qa.id}">
            ${qa.process.map((step,si)=>`
            <div class="step-pill ${si===0?'on':''}" id="spill-${qa.id}-${si}" onclick="setStep('${qa.id}',${si})">
              <div class="pill-num" style="border-color:${qa.color}88;color:${qa.color};${si===0?`background:${qa.color};border-color:${qa.color};color:#fff`:''}">${step.num}</div>
              <div class="pill-body" style="min-width:0">
                <div class="pill-t" style="${si===0?`color:${qa.color}`:''}">${step.title}</div>
                <div class="pill-d">${step.desc}</div>
              </div>
            </div>`).join('')}
          </div>
          <div class="panel al" style="--accent:${qa.color};border-left-color:${qa.color};background:${qa.bg};margin-top:auto;padding:.42rem .58rem">
            <div style="font-family:var(--fm);font-size:.53rem;color:var(--tm)">ISO TAG</div>
            <div style="font-family:var(--fh);font-size:.62rem;font-weight:700;color:${qa.color};margin-top:.08rem">${qa.num} · ${qa.en}</div>
          </div>
        </div>
      </div>` });

    // SLIDE C: Metrics + Verification + 4+1
    S.push({ lbl: `${label} — Metrics & Verify`, color: qa.color, type:'content', qaId: qa.id, html:`
      <div class="s-head">${qa.icon} ${qa.en} — Metrics, Verification &amp; 4+1 View</div>
      <div class="c2">
        <div class="col">
          <div style="font-family:var(--fh);font-size:.63rem;font-weight:700;color:var(--amber);margin-bottom:.28rem">📊 Metrics</div>
          <div class="panel scr" style="flex:1;overflow-y:auto">
            <table class="tbl">
              <thead><tr>
                <th>Metric / Sub</th><th>วัดอย่างไร</th><th>Target</th><th>Tool</th>
              </tr></thead>
              <tbody>
                ${qa.metrics.map(m=>`
                <tr>
                  <td style="color:${qa.color}">
                    <div>${m.name}</div>
                    <div style="font-size:.52rem;color:var(--tm)">${m.sub}</div>
                  </td>
                  <td style="font-size:.59rem">${m.how}</td>
                  <td><span class="badge-ok">${m.target}</span></td>
                  <td style="font-family:var(--fm);font-size:.55rem;color:var(--tm)">${m.tool}</td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
        <div class="col">
          <div style="font-family:var(--fh);font-size:.63rem;font-weight:700;color:var(--violet);margin-bottom:.28rem">✅ Verification</div>
          <div class="veri-stack">
            ${qa.verification.map(v=>{
              const cls = v.type==='auto'?'v-auto':v.type==='tool'?'v-tool':'v-manual';
              return `<div class="veri-row"><span class="v-badge ${cls}">${v.label}</span><span class="v-text">${v.text}</span></div>`;
            }).join('')}
          </div>
          <div style="font-family:var(--fh);font-size:.63rem;font-weight:700;color:var(--cyan);margin-top:.55rem;margin-bottom:.28rem">🗺 4+1 View Relevance</div>
          <div class="v41-row">
            ${Object.entries(qa.view41).map(([k,v])=>{
              const vi=VIEW41_INFO[k];
              return `<div class="v41-card" style="border-color:${vi.color}44;background:${vi.color}08">
                <div class="v41-ico">${vi.icon}</div>
                <div class="v41-nm" style="color:${vi.color}">${vi.name.replace(' View','').replace('Scenarios (+1)','Scenarios')}</div>
                <span class="v41-rel rel-${v.rel}">${v.rel.toUpperCase()}</span>
                <div class="v41-dsc">${v.desc.substring(0,58)}${v.desc.length>58?'…':''}</div>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>` });
  });

  // ─ 4+1 MODEL OVERVIEW ─
  S.push({ lbl:'4+1 Architectural View Model', color:'#f59e0b', type:'content', html:`
    <div class="s-head" style="color:var(--amber)">🏛 4+1 Architectural View Model — Philippe Kruchten 1995</div>
    <div class="c21">
      <div class="col">
        <div class="v41-big-grid">
          ${Object.entries(VIEW41_INFO).map(([k,vi])=>{
            const hiQAs = QA_DATA.filter(qa=>qa.view41[k]?.rel==='high').map(qa=>qa.en.split(' ')[0]);
            return `<div class="v41-big-card" style="border-left:3px solid ${vi.color}">
              <div class="v41-big-ico">${vi.icon}</div>
              <div class="v41-big-name" style="color:${vi.color}">${vi.name}</div>
              <div class="v41-big-focus">${vi.focus}</div>
              <div class="v41-big-diag">📐 ${vi.diagrams}</div>
              <div class="v41-qa-tags">${hiQAs.map(n=>`<span class="v41-qa-tag">${n}</span>`).join('')}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="col">
        <div class="ph" style="color:var(--td)">Stakeholder → Primary View</div>
        <div class="panel scr" style="flex:1;overflow-y:auto">
          <table class="tbl">
            <thead><tr><th>Stakeholder</th><th>Primary View</th><th>คำถามที่ตอบ</th></tr></thead>
            <tbody>
              ${[
                ['End User','Scenarios (+1)','ระบบทำสิ่งที่ฉันต้องการได้ไหม?','#f59e0b'],
                ['Business Analyst','Logical + Scenarios','Business logic ถูกต้องครบถ้วนไหม?','#3b82f6'],
                ['Architect','ทั้ง 4+1','Architecture ตอบ QA requirements ได้ไหม?','#60a5fa'],
                ['Developer','Development View','ควร organize code อย่างไร?','#a855f7'],
                ['DevOps / SRE','Physical + Process','Deployment + runtime เป็นแบบไหน?','#f97316'],
                ['Security Eng','Logical + Physical','Security boundary อยู่ที่ไหน?','#f43f5e'],
                ['Tester / QA','Scenarios + Process','Test cases ครอบคลุม scenario ไหนบ้าง?','#22c55e'],
              ].map(([s,v,q,c])=>`<tr>
                <td style="font-family:var(--fm);font-size:.58rem;color:${c}">${s}</td>
                <td><span style="font-family:var(--fm);font-size:.56rem;background:${c}18;border:1px solid ${c}44;color:${c};padding:1px 6px;border-radius:3px">${v}</span></td>
                <td style="font-size:.6rem">${q}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>` });

  return S;
}

// ════════════════════════════════════════════════
//  ENGINE
// ════════════════════════════════════════════════
const SLIDES = buildSlides();
const qaJump = {};
SLIDES.forEach((s,i)=>{ if(s.qaId && !qaJump[s.qaId]) qaJump[s.qaId]=i; });
function jumpQA(id){ goTo(qaJump[id]??0); }

let cur = 0;
const stage  = document.getElementById('stage');
const dotsEl = document.getElementById('dots');

// Render slides DOM
SLIDES.forEach((sl,i)=>{
  const div = document.createElement('div');
  div.className = `slide slide-${sl.type}`;
  div.id = `sl-${i}`;
  if(sl.type==='section'){
    div.style.setProperty('--accent', sl.color);
    div.style.borderLeftColor = sl.color;
  }
  div.innerHTML = sl.html;
  stage.appendChild(div);
});
document.getElementById('tot-n').textContent = SLIDES.length;

// Render dots
SLIDES.forEach((sl,i)=>{
  const d = document.createElement('div');
  const big = sl.type==='section'||sl.type==='cover';
  d.className = 'dot ' + (big?'lg':'sm');
  d.title = sl.lbl;
  d.id = 'dot-' + i;
  d.onclick = ()=>goTo(i);
  dotsEl.appendChild(d);
});

function goTo(n){
  if(n<0||n>=SLIDES.length) return;
  const p = cur;
  document.getElementById(`sl-${p}`)?.classList.remove('active');
  document.getElementById(`sl-${p}`)?.classList.add('exit');
  setTimeout(()=>document.getElementById(`sl-${p}`)?.classList.remove('exit'), 300);
  cur = n;
  document.getElementById(`sl-${n}`).classList.add('active');

  SLIDES.forEach((_,i)=>document.getElementById(`dot-${i}`)?.classList.toggle('active',i===n));
  document.getElementById('tb-sec').textContent = SLIDES[n].lbl || '';
  document.getElementById('cur-n').textContent  = n+1;
  document.getElementById('prog-bar').style.width = (n/(SLIDES.length-1)*100)+'%';
  document.getElementById('btn-p').disabled = n===0;
  document.getElementById('btn-n').disabled = n===SLIDES.length-1;

  const col = SLIDES[n].color || '#3b82f6';
  document.getElementById('tb-accent').style.color = col;
  document.getElementById('prog-bar').style.background = `linear-gradient(90deg,${col},var(--cyan))`;
  document.documentElement.style.setProperty('--accent', col);
}
function go(d){ goTo(cur+d); }

// Step switcher
function setStep(qaId, si){
  const qa = QA_DATA.find(q=>q.id===qaId);
  if(!qa) return;
  const step = qa.process[si];
  document.getElementById(`pn-${qaId}`).textContent  = `STEP ${step.num} / ${String(qa.process.length).padStart(2,'0')}`;
  document.getElementById(`pt-${qaId}`).textContent  = step.title;
  document.getElementById(`pd-${qaId}`).textContent  = step.desc;
  document.getElementById(`pc-${qaId}`).innerHTML    = step.example;
  document.querySelectorAll(`#sp-${qaId} .step-pill`).forEach((el,i)=>{
    el.classList.toggle('on', i===si);
    const num = el.querySelector('.pill-num');
    const t   = el.querySelector('.pill-t');
    if(i===si){ num.style.cssText=`background:${qa.color};border-color:${qa.color};color:#fff`; t.style.color=qa.color; }
    else       { num.style.cssText=`border-color:${qa.color}88;color:${qa.color}`;              t.style.color=''; }
  });
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) return;
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(1);}
  else if(e.key==='ArrowLeft'){e.preventDefault();go(-1);}
  else if(e.key==='Home'){e.preventDefault();goTo(0);}
  else if(e.key==='End'){e.preventDefault();goTo(SLIDES.length-1);}
});

// Theme toggle
function toggleTheme(){
  const dark = document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme', dark?'light':'dark');
  document.getElementById('theme-btn').textContent = dark?'🌙 Dark':'☀ Light';
}

goTo(0);
</script>
</body>
</html>
