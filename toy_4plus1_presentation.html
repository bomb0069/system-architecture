<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Toy-R-Not-Us v2 — 4+1 Architecture Presentation</title>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── ARCH CSS (inherited from Architecture file) ── */

:root {
  --ink: #0a0f1e;
  --ink2: #0f1830;
  --ink3: #141f3a;
  --line: rgba(96,165,250,0.15);
  --line2: rgba(96,165,250,0.3);
  --blue: #3b82f6;
  --blue-l: #60a5fa;
  --blue-ll: #93c5fd;
  --cyan: #06b6d4;
  --teal: #14b8a6;
  --green: #22c55e;
  --amber: #f59e0b;
  --orange: #f97316;
  --rose: #f43f5e;
  --violet: #8b5cf6;
  --text: #e2e8f0;
  --text-d: #94a3b8;
  --text-m: #4a5568;
  --fh: 'Oxanium', sans-serif;
  --fb: 'Noto Sans Thai', sans-serif;
  --fm: 'JetBrains Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ink);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden}

/* Grid bg */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;z-index:0;
}

/* HEADER */
header{
  position:sticky;top:0;z-index:200;
  background:rgba(10,15,30,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line2);
  padding:0 1.5rem;
  display:flex;align-items:center;justify-content:space-between;
  height:56px;
}
.h-logo{font-family:var(--fh);font-weight:800;font-size:1rem;letter-spacing:.06em}
.h-logo em{color:var(--amber);font-style:normal}
.h-logo span{color:var(--blue-l)}
.h-sub{font-family:var(--fm);font-size:.65rem;color:var(--text-m);letter-spacing:.1em;text-transform:uppercase}
.h-badge{
  font-family:var(--fm);font-size:.62rem;
  background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);
  color:var(--amber);padding:3px 10px;border-radius:999px;letter-spacing:.05em;
}

/* VIEW TABS */
.view-tabs{
  display:flex;
  background:var(--ink2);
  border-bottom:1px solid var(--line);
  overflow-x:auto;padding:0 1rem;
  position:sticky;top:56px;z-index:150;
}
.vtab{
  display:flex;align-items:center;gap:.5rem;
  padding:.75rem 1.2rem;
  font-family:var(--fh);font-size:.72rem;font-weight:600;
  color:var(--text-m);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  white-space:nowrap;transition:all .15s;letter-spacing:.04em;
  text-transform:uppercase;
}
.vtab:hover{color:var(--text-d)}
.vtab.active{color:var(--blue-l);border-bottom-color:var(--blue)}
.vtab .vnum{
  font-size:.55rem;
  background:rgba(59,130,246,.12);
  border:1px solid rgba(59,130,246,.2);
  color:var(--text-m);
  padding:1px 5px;border-radius:3px;
}
.vtab.active .vnum{background:rgba(59,130,246,.2);color:var(--blue-l)}

/* CONTENT */
.view-content{position:relative;z-index:1;padding:1.5rem;max-width:1400px;margin:0 auto}
.view-panel{display:none;animation:fadeUp .2s ease}
.view-panel.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* INTRO STRIP */
.intro-strip{
  display:flex;gap:1rem;align-items:flex-start;
  padding:1rem 1.2rem;
  background:var(--ink2);
  border:1px solid var(--line);
  border-left:3px solid;
  border-radius:8px;
  margin-bottom:1.5rem;
  font-size:.8rem;color:var(--text-d);line-height:1.6;
}
.intro-strip .is-icon{font-size:1.4rem;flex-shrink:0;margin-top:1px}
.intro-strip strong{font-family:var(--fh);font-size:.72rem;letter-spacing:.05em;display:block;margin-bottom:.2rem}

/* TWO-COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
@media(max-width:900px){.two-col,.three-col{grid-template-columns:1fr}}

/* CARD */
.card{
  background:var(--ink2);border:1px solid var(--line);
  border-radius:10px;padding:1rem;
}
.card-title{
  font-family:var(--fh);font-size:.75rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:.75rem;
  display:flex;align-items:center;gap:.4rem;
}
.card-title::after{content:'';flex:1;height:1px;background:var(--line)}

/* ── LOGICAL VIEW ── */
.domain-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:.6rem;margin-bottom:1rem;
}
.domain-card{
  background:var(--ink3);
  border:1px solid var(--line);
  border-radius:8px;
  padding:.75rem;
  cursor:pointer;
  transition:all .15s;
}
.domain-card:hover{border-color:var(--line2);transform:translateY(-2px)}
.dc-head{
  display:flex;align-items:center;gap:.4rem;
  margin-bottom:.5rem;
}
.dc-icon{font-size:1rem}
.dc-name{font-family:var(--fh);font-size:.72rem;font-weight:700}
.dc-type{font-family:var(--fm);font-size:.55rem;color:var(--text-m);margin-bottom:.4rem}
.dc-attrs{display:flex;flex-direction:column;gap:2px}
.dc-attr{
  font-family:var(--fm);font-size:.6rem;
  color:var(--text-d);
  padding:1px 0;
  border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;gap:.3rem;align-items:center;
}
.dc-attr .at{color:var(--cyan);flex-shrink:0}
.dc-attr .typ{color:var(--text-m);margin-left:auto;font-size:.55rem}
.dc-key{color:var(--amber)!important}
.dc-rel{
  margin-top:.5rem;
  display:flex;flex-direction:column;gap:2px;
}
.rel-item{
  font-family:var(--fm);font-size:.57rem;
  color:var(--violet);
  display:flex;align-items:center;gap:.3rem;
}

/* relation arrows */
.rel-diagram{
  background:var(--ink3);
  border:1px solid var(--line);
  border-radius:8px;
  padding:1rem;
  overflow-x:auto;
}

/* ── PROCESS VIEW ── */
.seq-container{background:var(--ink3);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.seq-actors{
  display:flex;
  background:var(--ink2);
  border-bottom:1px solid var(--line2);
  gap:0;
}
.seq-actor{
  flex:1;text-align:center;
  padding:.6rem .3rem;
  font-family:var(--fh);font-size:.6rem;font-weight:700;
  letter-spacing:.04em;
  border-right:1px solid var(--line);
}
.seq-actor:last-child{border-right:none}
.seq-body{padding:0;position:relative}
.seq-lifelines{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;pointer-events:none;
}
.seq-ll{flex:1;border-right:1px dashed rgba(96,165,250,.1)}
.seq-ll:last-child{border-right:none}
.seq-msg{
  position:relative;z-index:1;
  display:flex;align-items:center;
  padding:0;
  min-height:36px;
}
.seq-msg.group-start{
  margin-top:.5rem;
  border-top:1px solid rgba(96,165,250,.1);
}
.seq-label{
  position:absolute;
  background:var(--ink);
  border:1px solid;
  border-radius:4px;
  padding:2px 6px;
  font-family:var(--fm);font-size:.58rem;
  white-space:nowrap;
  transform:translateX(-50%);
  z-index:2;
}
.seq-arrow{
  position:absolute;
  height:1px;
  top:50%;
}
.seq-note{
  position:absolute;
  background:rgba(245,158,11,.08);
  border:1px solid rgba(245,158,11,.2);
  border-radius:4px;
  padding:2px 6px;
  font-family:var(--fm);font-size:.57rem;
  color:var(--amber);
  right:.5rem;
  transform:translateY(-50%);
  top:50%;
  z-index:3;
}

/* ── DEVELOPMENT VIEW ── */
.pkg-tree{display:flex;flex-direction:column;gap:.4rem}
.pkg-node{
  border-left:2px solid;
  padding:.4rem .6rem;
  margin-left:1rem;
  border-radius:0 6px 6px 0;
}
.pkg-node.root{margin-left:0;border-radius:6px;border-left-width:3px}
.pkg-name{font-family:var(--fh);font-size:.72rem;font-weight:700;margin-bottom:.2rem}
.pkg-desc{font-size:.68rem;color:var(--text-d);line-height:1.4}
.pkg-files{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.35rem}
.pkg-file{
  font-family:var(--fm);font-size:.58rem;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  color:var(--text-m);
  padding:1px 6px;border-radius:3px;
}
.dep-badge{
  font-family:var(--fm);font-size:.58rem;
  padding:1px 6px;border-radius:3px;
  display:inline-flex;align-items:center;gap:.25rem;
  margin-top:.3rem;
}
.dep-ext{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.25);color:var(--orange)}
.dep-int{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.15);color:var(--blue-l)}

/* ── PHYSICAL VIEW ── */
.infra-diagram{position:relative}
.infra-layer{
  border:1px solid;
  border-radius:10px;
  padding:.75rem 1rem;
  margin-bottom:.6rem;
  position:relative;
}
.infra-layer-label{
  font-family:var(--fh);font-size:.6rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  position:absolute;top:-9px;left:12px;
  padding:0 6px;
  background:var(--ink);
}
.infra-nodes{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center}
.inode{
  display:flex;flex-direction:column;align-items:center;
  gap:.25rem;text-align:center;
  padding:.5rem .75rem;
  background:var(--ink3);
  border:1px solid;
  border-radius:8px;
  min-width:80px;
  transition:all .15s;
  cursor:default;
}
.inode:hover{transform:translateY(-2px)}
.inode-icon{font-size:1.2rem}
.inode-name{font-family:var(--fh);font-size:.6rem;font-weight:700;line-height:1.2}
.inode-spec{font-family:var(--fm);font-size:.55rem;color:var(--text-m);margin-top:2px}
.inode-count{
  font-family:var(--fm);font-size:.55rem;
  background:rgba(34,197,94,.12);
  border:1px solid rgba(34,197,94,.25);
  color:var(--green);
  padding:1px 5px;border-radius:3px;
}
.inode-alert{
  font-family:var(--fm);font-size:.55rem;
  background:rgba(245,158,11,.12);
  border:1px solid rgba(245,158,11,.25);
  color:var(--amber);
  padding:1px 5px;border-radius:3px;
}
.infra-arrow{
  text-align:center;font-size:.7rem;color:var(--text-m);
  margin:.1rem 0;line-height:1;
}

/* ── SCENARIO VIEW ── */
.uc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.75rem;margin-bottom:1.5rem}
.uc-card{
  background:var(--ink2);
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:all .15s;
}
.uc-card:hover{border-color:var(--line2);transform:translateY(-2px)}
.uc-header{
  padding:.75rem 1rem;
  display:flex;align-items:center;gap:.6rem;
  border-bottom:1px solid var(--line);
}
.uc-num{
  font-family:var(--fm);font-size:.65rem;
  background:rgba(255,255,255,.06);
  padding:2px 7px;border-radius:4px;
  color:var(--text-m);
}
.uc-title{font-family:var(--fh);font-size:.78rem;font-weight:700}
.uc-body{padding:.75rem 1rem}
.uc-actor{font-family:var(--fm);font-size:.62rem;color:var(--cyan);margin-bottom:.4rem}
.uc-steps{display:flex;flex-direction:column;gap:.25rem}
.uc-step{
  display:flex;gap:.5rem;align-items:flex-start;
  font-size:.72rem;color:var(--text-d);line-height:1.4;
}
.uc-step-num{
  font-family:var(--fm);font-size:.58rem;
  background:rgba(59,130,246,.1);color:var(--blue-l);
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.uc-qa{
  display:flex;flex-wrap:wrap;gap:.25rem;
  margin-top:.6rem;padding-top:.5rem;
  border-top:1px solid var(--line);
}
.qa-tag{
  font-family:var(--fm);font-size:.57rem;
  padding:1px 6px;border-radius:3px;
  border:1px solid;
}

/* STAT STRIP */
.stat-strip{
  display:flex;gap:.75rem;flex-wrap:wrap;
  margin-bottom:1.5rem;
}
.stat-box{
  background:var(--ink2);border:1px solid var(--line);
  border-radius:8px;padding:.75rem 1rem;
  display:flex;flex-direction:column;gap:.15rem;
  flex:1;min-width:120px;
}
.stat-val{font-family:var(--fh);font-size:1.2rem;font-weight:800}
.stat-lbl{font-family:var(--fm);font-size:.6rem;color:var(--text-m);letter-spacing:.06em;text-transform:uppercase}
.stat-sub{font-size:.65rem;color:var(--text-d)}

/* FLOW DIAGRAM simple */
.flow-wrap{overflow-x:auto}
.flow-diag{
  display:flex;align-items:center;gap:0;
  padding:1rem;
  min-width:max-content;
}
.flow-box{
  border:1px solid;
  border-radius:6px;
  padding:.4rem .7rem;
  font-family:var(--fh);font-size:.62rem;font-weight:700;
  text-align:center;min-width:90px;
  white-space:nowrap;
}
.flow-diamond{
  border:1px solid;
  padding:.4rem .7rem;
  font-family:var(--fh);font-size:.58rem;
  text-align:center;
  transform:rotate(45deg);
  width:64px;height:64px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.flow-diamond span{transform:rotate(-45deg);display:block;font-size:.55rem;text-align:center;line-height:1.2}
.flow-arr{
  font-size:.8rem;color:var(--text-m);
  padding:0 .2rem;flex-shrink:0;
}
.flow-arr-d{
  display:flex;flex-direction:column;align-items:center;
  font-size:.8rem;color:var(--text-m);
  padding:0 .2rem;flex-shrink:0;
}

/* notify methods */
.method-list{display:flex;flex-direction:column;gap:.4rem}
.method-row{
  display:flex;align-items:center;gap:.75rem;
  padding:.5rem .75rem;
  background:var(--ink3);border:1px solid var(--line);border-radius:6px;
}
.method-icon{font-size:.9rem;flex-shrink:0}
.method-name{font-family:var(--fh);font-size:.68rem;font-weight:700;flex-shrink:0;width:90px}
.method-detail{font-size:.68rem;color:var(--text-d);line-height:1.4;flex:1}

/* PERF PANEL */
.perf-panel{
  background:var(--ink3);border:1px solid var(--line);
  border-radius:8px;padding:.75rem 1rem;margin-top:.75rem;
}
.perf-title{
  font-family:var(--fh);font-size:.68rem;font-weight:700;
  color:var(--amber);margin-bottom:.5rem;
}
.perf-bar-wrap{display:flex;flex-direction:column;gap:.4rem}
.perf-bar-row{display:flex;align-items:center;gap:.6rem;font-size:.65rem}
.perf-bar-label{width:130px;color:var(--text-d);flex-shrink:0;font-family:var(--fm);font-size:.6rem}
.perf-bar-bg{flex:1;background:rgba(255,255,255,.04);border-radius:999px;height:8px;overflow:hidden}
.perf-bar-fill{height:100%;border-radius:999px;transition:width .5s ease}
.perf-val{width:70px;text-align:right;font-family:var(--fm);font-size:.6rem;color:var(--text-d)}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:var(--ink3);border-radius:2px}

/* tooltip */
.tooltip{position:relative}
.tooltip:hover .tip-content{display:block}
.tip-content{
  display:none;position:absolute;z-index:999;
  top:calc(100% + 4px);left:50%;transform:translateX(-50%);
  background:var(--ink2);border:1px solid var(--line2);
  border-radius:6px;padding:.5rem .7rem;
  font-size:.68rem;color:var(--text-d);
  white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
  line-height:1.5;
}

.note-box{
  background:rgba(245,158,11,.06);
  border:1px solid rgba(245,158,11,.2);
  border-radius:6px;padding:.75rem 1rem;
  font-size:.75rem;color:var(--text-d);line-height:1.6;
  margin-top:.75rem;
}
.note-box strong{color:var(--amber);font-family:var(--fh)}

[data-theme="light"] {
  --ink: #f8fafc; --ink2: #ffffff; --ink3: #f1f5f9;
  --line: rgba(59,130,246,.15); --line2: rgba(59,130,246,.3);
  --text: #0f172a; --text-d: #334155; --text-m: #64748b;
  --blue: #2563eb; --blue-l: #1d4ed8; --blue-ll: #1e40af;
  --cyan: #0891b2; --teal: #0d9488; --green: #16a34a;
  --amber: #d97706; --orange: #ea6c0a; --rose: #e11d48;
  --violet: #7c3aed;
}
[data-theme="light"] body { background: var(--ink); }
[data-theme="light"] header { background: #1e3a8a !important; }
[data-theme="light"] .view-tabs { background: #ffffff !important; box-shadow: 0 1px 4px rgba(0,0,0,.06); border-bottom-color: rgba(59,130,246,.2); }
[data-theme="light"] .vtab { color: #64748b; }
[data-theme="light"] .vtab.active { background: rgba(219,234,254,.8); color: #1d4ed8; }
[data-theme="light"] .view-panel { background: #f8fafc; }
[data-theme="light"] .card { background: #ffffff !important; border-color: rgba(59,130,246,.15) !important; }
[data-theme="light"] .intro-strip { background: rgba(241,245,249,.9) !important; color: #334155; }
[data-theme="light"] .dc-head { background: rgba(241,245,249,.9) !important; }
[data-theme="light"] table th { background: #e8eef8 !important; color: #64748b !important; }
[data-theme="light"] table td { color: #334155 !important; }
[data-theme="light"] .inode { background: #ffffff !important; border-color: rgba(59,130,246,.2) !important; }
[data-theme="light"] svg[style*="background"] { background: #ffffff !important; }
[data-theme="light"] ::-webkit-scrollbar-track { background: #f1f5f9; }
[data-theme="light"] ::-webkit-scrollbar-thumb { background: #cbd5e1; }


/* ── LIGHT MODE ── */
[data-theme="light"] {
  --ink:#f8fafc; --ink2:#ffffff; --ink3:#f1f5f9;
  --line:rgba(59,130,246,.15); --line2:rgba(59,130,246,.3);
  --text:#0f172a; --text-d:#334155; --text-m:#64748b;
  --blue:#2563eb; --blue-l:#1d4ed8; --blue-ll:#1e40af;
  --cyan:#0891b2; --teal:#0d9488; --green:#16a34a;
  --amber:#d97706; --orange:#ea580c; --rose:#e11d48; --violet:#7c3aed;
}
[data-theme="light"] body { background:var(--ink); }
[data-theme="light"] .card { background:#ffffff !important; border-color:rgba(59,130,246,.15) !important; }
[data-theme="light"] .card-title { color:var(--text); }
[data-theme="light"] .intro-strip { background:rgba(219,234,254,.3) !important; }
[data-theme="light"] .dc-head { background:rgba(219,234,254,.25) !important; }
[data-theme="light"] table th { background:#e8eef8 !important; color:#64748b !important; border-color:rgba(59,130,246,.2) !important; }
[data-theme="light"] table td { color:#334155 !important; border-color:rgba(59,130,246,.12) !important; }
[data-theme="light"] .stat-box { background:#ffffff !important; border-color:rgba(59,130,246,.2) !important; }
[data-theme="light"] .inode { background:#ffffff !important; border-color:rgba(59,130,246,.2) !important; }
[data-theme="light"] .infra-layer { background:#ffffff !important; border-color:rgba(59,130,246,.2) !important; }
[data-theme="light"] .uc-card { background:#ffffff !important; border-color:rgba(59,130,246,.15) !important; }
[data-theme="light"] .uc-step { background:#f1f5f9 !important; }
[data-theme="light"] .dc-item { background:#ffffff !important; }
[data-theme="light"] .tag { background:rgba(30,64,175,.08) !important; color:#1e40af !important; border-color:rgba(30,64,175,.2) !important; }
[data-theme="light"] #pres-topbar { background:rgba(248,250,252,.97) !important; box-shadow:0 1px 6px rgba(0,0,0,.07); }
[data-theme="light"] #pres-bot { background:rgba(248,250,252,.97) !important; box-shadow:0 -1px 4px rgba(0,0,0,.05); }
[data-theme="light"] .pres-btn { background:#e8eef8 !important; border-color:rgba(59,130,246,.25) !important; color:#334155 !important; }
[data-theme="light"] .pres-btn.nxt { background:rgba(37,99,235,.12) !important; color:#1d4ed8 !important; }

/* ── PRESENTATION SHELL ── */
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--ink); color:var(--text); font-family:var(--fb); }
#pres-app { display:grid; grid-template-rows:42px 2px 1fr 50px; height:100vh; }

/* Topbar */
#pres-topbar {
  display:flex; align-items:center; padding:0 1.2rem; gap:.75rem; z-index:100;
  background:rgba(10,15,30,.96); border-bottom:1px solid var(--line); backdrop-filter:blur(10px);
}
.tb-brand { font-family:var(--fh); font-weight:800; font-size:.78rem; letter-spacing:.07em; white-space:nowrap; }
.tb-brand em { font-style:normal; color:var(--accent,var(--amber)); transition:color .4s; }
.tb-divider { width:1px; height:16px; background:var(--line2); flex-shrink:0; }
.tb-sec { font-family:var(--fm); font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:var(--text-m); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tb-cnt { font-family:var(--fm); font-size:.62rem; color:var(--text-m); white-space:nowrap; }
.tb-cnt b { color:var(--blue-l); }
.tb-keys { font-family:var(--fm); font-size:.52rem; color:var(--text-m); white-space:nowrap; }
.tb-keys kbd { background:var(--ink3); border:1px solid var(--line2); border-radius:3px; padding:0 4px; font-size:.56rem; }
#theme-btn {
  display:flex; align-items:center; gap:.3rem; padding:.22rem .65rem;
  background:var(--ink3); border:1px solid var(--line2); border-radius:5px;
  font-family:var(--fh); font-size:.58rem; font-weight:700; letter-spacing:.05em;
  color:var(--text-d); cursor:pointer; transition:all .14s; white-space:nowrap;
}
#theme-btn:hover { background:var(--ink2); color:var(--text); }

/* Progress */
#pres-prog { background:var(--ink3); }
#pres-prog-bar { height:100%; background:linear-gradient(90deg,var(--accent,var(--blue)),var(--cyan)); transition:width .35s cubic-bezier(.4,0,.2,1); }

/* Stage */
#pres-stage { position:relative; overflow:hidden; }

/* Slide base */
.pres-slide {
  position:absolute; inset:0;
  opacity:0; pointer-events:none;
  transition:opacity .28s ease, transform .28s cubic-bezier(.4,0,.2,1);
  transform:translateX(50px);
  padding:1.1rem 1.5rem .8rem;
  display:flex; flex-direction:column;
  overflow:hidden;
  background:var(--ink);
}
.pres-slide::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:
    linear-gradient(var(--line) 1px,transparent 1px),
    linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:52px 52px;
}
.pres-slide.active { opacity:1; pointer-events:all; transform:none; }
.pres-slide.exit   { opacity:0; transform:translateX(-50px); }

/* Section slides */
.pres-slide.slide-sec {
  justify-content:center; padding:2rem 2.5rem;
  border-left:4px solid var(--accent,var(--amber));
}

/* Cover slide */
.pres-slide.slide-cover {
  align-items:center; justify-content:center; text-align:center;
  background:
    radial-gradient(ellipse 65% 55% at 15% 50%,rgba(59,130,246,.12) 0%,transparent 65%),
    radial-gradient(ellipse 55% 45% at 85% 35%,rgba(245,158,11,.08) 0%,transparent 60%),
    var(--ink);
}

/* Bottom nav */
#pres-bot {
  display:grid; grid-template-columns:auto 1fr auto; align-items:center; padding:0 1.1rem; gap:.6rem;
  background:rgba(10,15,30,.96); border-top:1px solid var(--line); backdrop-filter:blur(10px); z-index:100;
}
.pres-btn {
  display:flex; align-items:center; gap:.35rem; padding:.27rem .85rem;
  border-radius:6px; background:var(--ink3); border:1px solid var(--line2);
  font-family:var(--fh); font-size:.6rem; font-weight:700; letter-spacing:.05em;
  color:var(--text-d); cursor:pointer; transition:all .12s;
}
.pres-btn:hover { background:var(--ink2); color:var(--text); }
.pres-btn:disabled { opacity:.3; cursor:default; }
.pres-btn.nxt { background:rgba(59,130,246,.12); border-color:rgba(59,130,246,.3); color:var(--blue-l); }
.pres-btn.nxt:hover { background:rgba(59,130,246,.22); }
#pres-dots { display:flex; align-items:center; gap:.25rem; justify-content:center; flex-wrap:wrap; }
.dot { border-radius:50%; cursor:pointer; transition:all .18s; background:var(--ink3); border:1px solid transparent; flex-shrink:0; }
.dot.sm { width:5px; height:5px; }
.dot.lg { width:7px; height:7px; background:rgba(245,158,11,.3); }
.dot.active { transform:scale(1.45); border-color:var(--accent,var(--blue-l)); }
.dot.sm.active { background:var(--blue-l); }
.dot.lg.active { background:var(--amber); }

/* Slide heading */
.s-head {
  display:flex; align-items:center; gap:.5rem; flex-shrink:0; margin-bottom:.75rem;
  font-family:var(--fh); font-size:.65rem; font-weight:700;
  text-transform:uppercase; letter-spacing:.07em; color:var(--accent,var(--blue-l));
}
.s-head::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(128,128,128,.25),transparent); }

/* Layout helpers inside slides */
.slide-body-fill { flex:1; min-height:0; display:flex; flex-direction:column; }
.cols-2-equal { display:grid; grid-template-columns:1fr 1fr; gap:.9rem; flex:1; min-height:0; overflow:hidden; }
.cols-2-equal > div { overflow-y:auto; }

/* Section divider typography */
.sec-badge { font-family:var(--fm); font-size:.57rem; letter-spacing:.13em; text-transform:uppercase; color:var(--text-m); margin-bottom:.45rem; }
.sec-icon { font-size:2.5rem; line-height:1; margin-bottom:.6rem; }
.sec-title { font-family:var(--fh); font-size:clamp(1.8rem,3.8vw,2.8rem); font-weight:800; line-height:1.15; margin-bottom:.3rem; }
.sec-th { font-size:clamp(.85rem,1.4vw,1.05rem); color:var(--text-d); margin-bottom:.7rem; line-height:1.5; }
.sec-desc { font-size:.74rem; color:var(--text-d); max-width:700px; line-height:1.75; padding-left:.9rem; border-left:2px solid var(--line2); }
.sec-tags { display:flex; flex-wrap:wrap; gap:.35rem; margin-top:.9rem; }
.stag { font-family:var(--fm); font-size:.58rem; padding:2px 9px; border-radius:4px; border:1px solid; background:rgba(255,255,255,.04); }

/* Cover typography */
.cov-badge { font-family:var(--fm); font-size:.6rem; letter-spacing:.14em; text-transform:uppercase; color:var(--blue-l); background:rgba(59,130,246,.1); border:1px solid rgba(59,130,246,.28); padding:3px 14px; border-radius:999px; display:inline-block; margin-bottom:1.2rem; }
.cov-title { font-family:var(--fh); font-weight:800; font-size:clamp(2rem,5vw,3.5rem); line-height:1.1; margin-bottom:.5rem; }
.cov-title em { font-style:normal; color:var(--amber); }
.cov-sub { font-size:clamp(.75rem,1.2vw,.92rem); color:var(--text-d); line-height:1.75; max-width:560px; margin:0 auto .6rem; }
.cov-meta { font-family:var(--fm); font-size:.6rem; color:var(--text-m); margin-bottom:1.4rem; }
.cov-chips { display:flex; flex-wrap:wrap; gap:.4rem; justify-content:center; }
.cov-chip { font-family:var(--fm); font-size:.58rem; padding:3px 11px; border-radius:6px; border:1px solid; }

/* Override card sizing inside slides */
.pres-slide .card { max-height:none !important; }
.pres-slide .uc-grid { overflow-y:auto; flex:1; }
.pres-slide .state-grid-outer { overflow-y:auto; flex:1; }

/* Scrollbars */
::-webkit-scrollbar { width:3px; height:3px; }
::-webkit-scrollbar-track { background:var(--ink2); }
::-webkit-scrollbar-thumb { background:var(--ink3); border-radius:2px; }
</style>
</head>

// ═══════════════════════════ ENGINE ══════════════════════════
let cur = 0;
const stage  = document.getElementById('pres-stage');
const dotsEl = document.getElementById('pres-dots');

// Build slides
SLIDES.forEach((sl, i) => {
  const div = document.createElement('div');
  div.className = 'pres-slide ' + sl.cls;
  div.id = 'sl-' + i;
  if (sl.style) div.setAttribute('style', sl.style);
  div.innerHTML = sl.html;
  stage.appendChild(div);
});
document.getElementById('tot-n').textContent = SLIDES.length;

// Build dots
SLIDES.forEach((sl, i) => {
  const d = document.createElement('div');
  const big = sl.type === 'sec' || sl.type === 'cover';
  d.className = 'dot ' + (big ? 'lg' : 'sm');
  d.title = sl.lbl;
  d.id = 'dot-' + i;
  d.onclick = () => goTo(i);
  dotsEl.appendChild(d);
});

function goTo(n) {
  if (n < 0 || n >= SLIDES.length) return;
  const p = cur;
  const prev = document.getElementById('sl-' + p);
  const next = document.getElementById('sl-' + n);
  if (prev) { prev.classList.remove('active'); prev.classList.add('exit'); }
  setTimeout(() => prev && prev.classList.remove('exit'), 300);
  next.classList.add('active');
  cur = n;

  SLIDES.forEach((_, i) => document.getElementById('dot-' + i)?.classList.toggle('active', i === n));
  document.getElementById('tb-sec').textContent = SLIDES[n].lbl;
  document.getElementById('cur-n').textContent  = n + 1;
  document.getElementById('pres-prog-bar').style.width = (n / (SLIDES.length - 1) * 100) + '%';
  document.getElementById('btn-p').disabled = n === 0;
  document.getElementById('btn-n').disabled = n === SLIDES.length - 1;

  const col = SLIDES[n].color || '#3b82f6';
  document.getElementById('tb-em').style.color = col;
  document.documentElement.style.setProperty('--accent', col);
}

function go(d) { goTo(cur + d); }

document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
  else if (e.key === 'Home')  { e.preventDefault(); goTo(0); }
  else if (e.key === 'End')   { e.preventDefault(); goTo(SLIDES.length - 1); }
});

function toggleTheme() {
  const html = document.documentElement;
  const dark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = dark ? '🌙 Dark' : '☀ Light';
}

goTo(0);
</script>
