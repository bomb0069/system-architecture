<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISO 25010 Quality Attributes — Interactive Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1a4a;
    --navy-mid: #152060;
    --navy-light: #1e2d7a;
    --blue: #3B82F4;
    --blue-bright: #60a5fa;
    --orange: #F5A623;
    --orange-dim: #d4891c;
    --teal: #14b8a6;
    --green: #22c55e;
    --red: #ef4444;
    --purple: #a855f7;
    --bg: #070e2b;
    --bg2: #0d1a4a;
    --bg3: #111f5c;
    --border: rgba(59,130,244,0.2);
    --border-bright: rgba(59,130,244,0.5);
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-muted: #64748b;
    --font-head: 'Syne', sans-serif;
    --font-body: 'IBM Plex Sans Thai', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, var(--navy-mid) 0%, #0d1a4a 60%, #1a0a3a 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo-mark {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 1.1rem;
    color: var(--orange);
    letter-spacing: 0.05em;
  }
  .logo-mark span { color: var(--blue-bright); }
  .header-title {
    font-family: var(--font-head);
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .header-badge {
    background: rgba(59,130,244,0.15);
    border: 1px solid var(--border-bright);
    color: var(--blue-bright);
    font-size: 0.7rem;
    font-family: var(--font-mono);
    padding: 3px 10px;
    border-radius: 999px;
  }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: calc(100vh - 64px);
  }

  /* ── SIDEBAR ── */
  aside {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 1.5rem 0;
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
    overflow-y: auto;
  }
  .sidebar-section-title {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0 1.5rem;
    margin-bottom: 0.5rem;
    margin-top: 1.5rem;
  }
  .sidebar-section-title:first-child { margin-top: 0; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.65rem 1.5rem;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 3px solid transparent;
    position: relative;
  }
  .nav-item:hover { background: rgba(59,130,244,0.07); }
  .nav-item.active {
    background: rgba(59,130,244,0.12);
    border-left-color: var(--blue);
  }
  .nav-dot {
    width: 28px; height: 28px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    flex-shrink: 0;
    font-family: var(--font-head);
  }
  .nav-text { flex: 1; }
  .nav-en {
    font-size: 0.72rem;
    font-weight: 600;
    font-family: var(--font-head);
    line-height: 1;
  }
  .nav-th {
    font-size: 0.65rem;
    color: var(--text-muted);
    line-height: 1.4;
    margin-top: 2px;
  }
  .nav-item.active .nav-th { color: var(--text-dim); }

  /* ── MAIN ── */
  main {
    padding: 2rem;
    overflow-y: auto;
    max-height: calc(100vh - 64px);
  }

  /* ── TAB BAR ── */
  .tabs {
    display: flex;
    gap: 0.25rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
    overflow-x: auto;
    padding-bottom: 0;
  }
  .tab-btn {
    font-family: var(--font-head);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    padding: 0.6rem 1.1rem;
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .tab-btn:hover { color: var(--text-dim); }
  .tab-btn.active {
    color: var(--blue-bright);
    border-bottom-color: var(--blue);
  }

  /* ── CONTENT PANELS ── */
  .panel { display: none; animation: fadeIn 0.2s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ── QA HERO ── */
  .qa-hero {
    display: flex;
    align-items: flex-start;
    gap: 1.5rem;
    margin-bottom: 2rem;
    padding: 1.5rem;
    background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    position: relative;
    overflow: hidden;
  }
  .qa-hero::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,244,0.06) 0%, transparent 70%);
    transform: translate(40%, -40%);
  }
  .qa-icon-big {
    width: 64px; height: 64px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    flex-shrink: 0;
  }
  .qa-hero-text h1 {
    font-family: var(--font-head);
    font-size: 1.4rem;
    font-weight: 800;
    margin-bottom: 0.25rem;
  }
  .qa-hero-text .qa-num {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
  }
  .qa-hero-text p {
    font-size: 0.9rem;
    color: var(--text-dim);
    line-height: 1.6;
    max-width: 600px;
  }
  .iso-tag {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    background: rgba(245,166,35,0.1);
    border: 1px solid rgba(245,166,35,0.3);
    color: var(--orange);
    padding: 4px 10px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── SUB-CHARACTERISTICS ── */
  .sub-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 0.75rem;
    margin-bottom: 2rem;
  }
  .sub-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1rem;
    transition: border-color 0.15s;
  }
  .sub-card:hover { border-color: var(--border-bright); }
  .sub-name {
    font-family: var(--font-head);
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--blue-bright);
    margin-bottom: 0.3rem;
  }
  .sub-th {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
  }
  .sub-desc {
    font-size: 0.72rem;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* ── SECTION HEADER ── */
  .section-h {
    font-family: var(--font-head);
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-h::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(245,166,35,0.3), transparent);
  }

  /* ── PROCESS FLOW ── */
  .process-flow {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-bottom: 2rem;
  }
  .process-step {
    display: grid;
    grid-template-columns: 48px 1fr;
    gap: 0;
    position: relative;
  }
  .process-step:not(:last-child) .step-line {
    position: absolute;
    left: 23px;
    top: 48px;
    width: 2px;
    height: calc(100% - 16px);
    background: linear-gradient(to bottom, var(--blue), rgba(59,130,244,0.1));
  }
  .process-step:last-child .step-line { display: none; }
  .step-node {
    width: 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 4px;
    position: relative;
    z-index: 1;
  }
  .step-circle {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    font-weight: 700;
    border: 2px solid;
    flex-shrink: 0;
  }
  .step-body {
    padding: 0 0 1.5rem 1rem;
  }
  .step-title {
    font-family: var(--font-head);
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 0.4rem;
    padding-top: 4px;
  }
  .step-desc {
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 0.75rem;
  }

  /* ── CODE BLOCK / EXAMPLE ── */
  .code-block {
    background: #030a1f;
    border: 1px solid rgba(59,130,244,0.15);
    border-left: 3px solid var(--blue);
    border-radius: 8px;
    padding: 0.9rem 1rem;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    line-height: 1.7;
    color: var(--text-dim);
    overflow-x: auto;
    white-space: pre-wrap;
  }
  .code-block .key { color: var(--blue-bright); }
  .code-block .val { color: var(--orange); }
  .code-block .str { color: var(--teal); }
  .code-block .cmt { color: var(--text-muted); font-style: italic; }
  .code-block .ok { color: var(--green); }
  .code-block .err { color: var(--red); }

  /* ── METRICS TABLE ── */
  .metrics-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
    margin-bottom: 2rem;
  }
  .metrics-table th {
    font-family: var(--font-head);
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    padding: 0.6rem 0.8rem;
    text-align: left;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .metrics-table td {
    padding: 0.65rem 0.8rem;
    border-bottom: 1px solid rgba(59,130,244,0.08);
    color: var(--text-dim);
    vertical-align: top;
    line-height: 1.5;
  }
  .metrics-table tr:hover td { background: rgba(59,130,244,0.04); }
  .metric-name {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--teal);
  }
  .target-pill {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 0.66rem;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.3);
    color: var(--green);
    white-space: nowrap;
  }

  /* ── 4+1 VIEW GRID ── */
  .view41-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.75rem;
    margin-bottom: 2rem;
  }
  .view-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    transition: all 0.15s;
    cursor: default;
  }
  .view-card:hover { border-color: var(--border-bright); transform: translateY(-1px); }
  .view-card.highlighted { border-color: var(--orange); background: rgba(245,166,35,0.05); }
  .view-card-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
  }
  .view-icon {
    width: 30px; height: 30px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
  }
  .view-name {
    font-family: var(--font-head);
    font-size: 0.78rem;
    font-weight: 700;
  }
  .view-diagram-type {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }
  .view-relevance {
    font-size: 0.72rem;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .rel-badge {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    padding: 1px 6px;
    border-radius: 3px;
    margin-bottom: 0.4rem;
  }
  .rel-high { background: rgba(245,166,35,0.15); color: var(--orange); border: 1px solid rgba(245,166,35,0.3); }
  .rel-med { background: rgba(59,130,244,0.12); color: var(--blue-bright); border: 1px solid rgba(59,130,244,0.25); }
  .rel-low { background: rgba(100,116,139,0.1); color: var(--text-muted); border: 1px solid rgba(100,116,139,0.2); }

  /* ── VERIFICATION CHECKLIST ── */
  .check-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 2rem; }
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    padding: 0.75rem 1rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .check-icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .ci-auto { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .ci-manual { background: rgba(245,166,35,0.15); color: var(--orange); border: 1px solid rgba(245,166,35,0.3); }
  .ci-tool { background: rgba(59,130,244,0.15); color: var(--blue-bright); border: 1px solid rgba(59,130,244,0.3); }

  /* ── OVERVIEW PAGE ── */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .ov-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    gap: 0.9rem;
    align-items: flex-start;
  }
  .ov-card:hover { border-color: var(--border-bright); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .ov-icon { font-size: 1.5rem; flex-shrink: 0; margin-top: 2px; }
  .ov-card h3 {
    font-family: var(--font-head);
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 0.2rem;
  }
  .ov-card .ov-th { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.4rem; }
  .ov-card p { font-size: 0.75rem; color: var(--text-dim); line-height: 1.5; }
  .ov-subs {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-top: 0.5rem;
  }
  .ov-sub-tag {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    background: rgba(59,130,244,0.08);
    border: 1px solid rgba(59,130,244,0.15);
    color: var(--text-muted);
    padding: 1px 6px;
    border-radius: 4px;
  }

  /* ── PROCESS OVERVIEW DIAGRAM ── */
  .process-diagram {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 2rem;
    overflow-x: auto;
    padding: 1.2rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .pd-box {
    flex-shrink: 0;
    text-align: center;
    width: 120px;
  }
  .pd-circle {
    width: 60px; height: 60px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    margin: 0 auto 0.4rem;
    border: 2px solid;
  }
  .pd-label {
    font-family: var(--font-head);
    font-size: 0.68rem;
    font-weight: 700;
    line-height: 1.3;
  }
  .pd-sub {
    font-size: 0.6rem;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .pd-arrow {
    font-size: 1.2rem;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  /* ── 4+1 OVERVIEW DIAGRAM ── */
  .view41-diagram {
    position: relative;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }
  .view41-center {
    text-align: center;
    margin-bottom: 1rem;
  }
  .scenario-box {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(245,166,35,0.1);
    border: 2px solid var(--orange);
    border-radius: 10px;
    padding: 0.6rem 1.2rem;
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--orange);
  }
  .view41-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  @media (min-width: 900px) {
    .view41-row { grid-template-columns: 1fr 1fr 1fr 1fr; }
  }
  .vr-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem;
    text-align: center;
  }
  .vr-name {
    font-family: var(--font-head);
    font-size: 0.78rem;
    font-weight: 700;
    margin-bottom: 0.2rem;
  }
  .vr-focus { font-size: 0.68rem; color: var(--text-muted); margin-bottom: 0.4rem; }
  .vr-qa-tags { display: flex; flex-wrap: wrap; gap: 0.25rem; justify-content: center; }
  .vr-tag {
    font-size: 0.58rem;
    font-family: var(--font-mono);
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid rgba(59,130,244,0.2);
    color: var(--blue-bright);
    background: rgba(59,130,244,0.07);
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--navy-light); border-radius: 3px; }

  /* ── INTRO BANNER ── */
  .intro-banner {
    background: linear-gradient(135deg, rgba(59,130,244,0.08) 0%, rgba(245,166,35,0.05) 100%);
    border: 1px solid var(--border);
    border-left: 3px solid var(--blue);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    margin-bottom: 2rem;
    font-size: 0.82rem;
    color: var(--text-dim);
    line-height: 1.7;
  }
  .intro-banner strong { color: var(--blue-bright); font-family: var(--font-head); }

  /* ── PILL TAGS ── */
  .pill { display: inline-flex; align-items: center; gap: 0.3rem; font-family: var(--font-mono); font-size: 0.65rem; padding: 2px 8px; border-radius: 999px; }
  .pill-blue { background: rgba(59,130,244,0.12); border: 1px solid rgba(59,130,244,0.25); color: var(--blue-bright); }
  .pill-orange { background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.25); color: var(--orange); }
  .pill-teal { background: rgba(20,184,166,0.1); border: 1px solid rgba(20,184,166,0.25); color: var(--teal); }
  .pill-green { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); color: var(--green); }

  .info-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }

[data-theme="light"] {
  --navy: #1e40af; --navy-mid: #1d4ed8; --navy-light: #2563eb;
  --blue: #2563eb; --blue-bright: #1d4ed8;
  --orange: #d97706; --orange-dim: #b45309;
  --teal: #0d9488; --green: #16a34a; --red: #dc2626; --purple: #7c3aed;
  --bg: #f8fafc; --bg2: #ffffff; --bg3: #f1f5f9;
  --border: rgba(59,130,246,.18); --border-bright: rgba(59,130,246,.4);
  --text: #0f172a; --text-dim: #334155; --text-muted: #64748b;
}

let currentPage = 'overview';
let currentQA = null;
let currentTab = 'overview';

function navigateTo(page, qaId) {
  currentPage = page;
  currentQA = qaId || null;

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + (qaId || page));
  if (navEl) navEl.classList.add('active');

  const main = document.getElementById('main-content');

  if (page === 'overview') {
    main.innerHTML = renderOverview();
  } else if (page === 'process') {
    main.innerHTML = renderProcessPage();
  } else if (page === 'view41') {
    main.innerHTML = renderView41Page();
  } else if (page === 'qa' && qaId) {
    const qa = QA_DATA.find(q => q.id === qaId);
    if (qa) main.innerHTML = renderQA(qa);
    currentTab = 'overview';
  }
}

function switchTab(tabId) {
  currentTab = tabId;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-btn-' + tabId).classList.add('active');
  document.getElementById('panel-' + tabId).classList.add('active');
}

}

<span class="key">[HOW]</span>    วัดจาก <span class="val">${qa.metrics[0]?.tool || 'Tool'}</span>

<span class="key">Context</span>: ${qa.desc.substring(0, 80)}...
<span class="key">Decision</span>: [เลือก pattern/approach อะไร]
<span class="key">QA Impact</span>: ${qa.en} ↑ / [Other QA] ↓

        return `

        `;
      }).join('')}

  </div>
  `;
}

function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('theme-btn').textContent=isDark?'🌙 Dark':'☀ Light';
  document.getElementById('theme-btn').style.background=isDark?'rgba(0,0,0,.08)':'rgba(255,255,255,.1)';
  document.getElementById('theme-btn').style.color=isDark?'#334155':'rgba(255,255,255,.85)';
  document.getElementById('theme-btn').style.borderColor=isDark?'rgba(0,0,0,.15)':'rgba(255,255,255,.2)';
}
